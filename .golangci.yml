version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - gocritic
    - gosec
    - nilerr
    - errorlint
    - bodyclose
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Printf
        - fmt.Println
        - (os.File).Close
        - (io.Closer).Close
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - ifElseChain
    gosec:
      excludes:
        - G101
        - G304

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
